<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign Up – FindMEDKH</title>
  <link rel="stylesheet" href="../assets/css/shared.css"/>
  <style>
    /* ═══════════════════════════════════════════════════════════════
       PAGE STYLES: signup.html
       TO CUSTOMIZE:
       • Background: edit body background gradient
       • Perks list: edit .perk-item entries in HTML
       • Password strength colors: edit .pw-strength-bar backgrounds in JS
    ═══════════════════════════════════════════════════════════════ */
    body {
      display:flex; flex-direction:column; min-height:100vh;
      background: linear-gradient(140deg, var(--sky-mid) 0%, var(--sky) 40%, #85C1E9 100%);
    }
    #navbar { background:rgba(255,255,255,.15); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,.2); }
    .nav-brand { color:var(--white) !important; }
    .nav-links a { color:rgba(255,255,255,.8) !important; }
    .nav-links a:hover { color:var(--white) !important; }

    .auth-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 1.5rem; }
    .auth-card { background:var(--white); border-radius:var(--r-xl); padding:3rem 2.5rem; width:100%; max-width:440px; box-shadow:var(--shadow-xl); }

    .auth-logo { text-align:center; margin-bottom:1.5rem; }
    .logo-icon { width:64px; height:64px; margin:0 auto .9rem; background:linear-gradient(135deg,var(--sky),var(--sky-dark)); border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:1.9rem; color:var(--white); box-shadow:0 6px 20px rgba(46,134,193,.3); }
    .auth-logo p { color:var(--ink-muted); font-size:.9rem; }

    /* Benefits list shown above form */
    /* TO CHANGE PERKS: edit .perk-item entries in the HTML below */
    .perks { background:var(--sky-xpale); border-radius:var(--r-md); padding:1rem 1.1rem; margin-bottom:1.3rem; display:flex; flex-direction:column; gap:.5rem; }
    .perk-item { display:flex; align-items:center; gap:.6rem; font-size:.83rem; color:var(--ink-mid); }
    .perk-check { width:20px; height:20px; border-radius:50%; background:var(--sky); color:var(--white); display:flex; align-items:center; justify-content:center; font-size:.72rem; flex-shrink:0; font-weight:700; }

    .err-box { background:var(--danger-pale); border:1px solid #F5C6C2; border-radius:var(--r-sm); padding:.7rem 1rem; font-size:.85rem; color:var(--danger); margin-bottom:1rem; display:none; }

    /* Password strength meter */
    .pw-bar-wrap { height:4px; border-radius:2px; background:var(--border); margin-top:.4rem; overflow:hidden; }
    .pw-bar { height:100%; border-radius:2px; width:0; transition:all .35s ease; }
    .pw-hint { font-size:.74rem; color:var(--ink-muted); margin-top:.3rem; }

    .terms { font-size:.78rem; color:var(--ink-muted); margin:.2rem 0 1rem; line-height:1.55; }
    .terms a { color:var(--sky-dark); font-weight:600; }
    .auth-switch { text-align:center; margin-top:1.2rem; font-size:.88rem; color:var(--ink-muted); }
    .auth-switch a { color:var(--sky-dark); font-weight:600; }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="auth-wrap">
    <div class="auth-card">

      <!-- Logo — TO CHANGE: edit icon and title text -->
      <div class="auth-logo">
        <div class="logo-icon">✚</div>
        <h2>Create Account</h2>
        <p>Free forever — no credit card needed</p>
      </div>

      <!-- Perks list — TO ADD/REMOVE PERKS: edit .perk-item blocks below -->
      <div class="perks">
        <div class="perk-item"><div class="perk-check">✓</div> Unlimited chatbot messages</div>
        <div class="perk-item"><div class="perk-check">✓</div> Saved chat history</div>
        <div class="perk-item"><div class="perk-check">✓</div> Personalized hospital recommendations</div>
      </div>

      <div class="err-box" id="errBox"></div>

      <!-- Registration form fields -->
      <!-- TO ADD A FIELD: add .form-group div, then handle in register() function below -->
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Dara Chan" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Minimum 8 characters"
          autocomplete="new-password" oninput="checkStrength(this.value)"
          onkeydown="if(event.key==='Enter')register()"/>
        <!-- Password strength indicator bar -->
        <div class="pw-bar-wrap"><div class="pw-bar" id="pwBar"></div></div>
        <div class="pw-hint" id="pwHint">Enter at least 8 characters</div>
      </div>

      <!-- Terms text — TO CHANGE: edit link hrefs and text -->
      <p class="terms">By signing up you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>

      <button class="btn btn-primary btn-full btn-lg" id="regBtn" onclick="register()">
        Create Free Account
      </button>

      <div class="auth-switch">Already have an account? <a href="login.html">Log in →</a></div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="../assets/js/shared.js"></script>
  <script>
    renderNavbar('signup');
    if (isLoggedIn()) window.location.href = '../index.html';

    function showErr(msg) {
      const el = document.getElementById('errBox');
      el.textContent = msg; el.style.display = 'block';
    }

    /* ── PASSWORD STRENGTH CHECKER ─────────────────────────────────────
       TO CHANGE STRENGTH COLORS: edit bg values in scores[] below
    ─────────────────────────────────────────────────────────────────── */
    function checkStrength(pw) {
      let score = 0;
      if (pw.length >= 8)           score++;
      if (/[A-Z]/.test(pw))         score++;
      if (/[0-9]/.test(pw))         score++;
      if (/[^A-Za-z0-9]/.test(pw))  score++;
      const scores = [
        { w:'0%',   bg:'transparent',  t:'Enter at least 8 characters' },
        { w:'25%',  bg:'var(--danger)', t:'Weak password' },
        { w:'50%',  bg:'var(--warning)',t:'Fair password' },
        { w:'75%',  bg:'var(--gold)',   t:'Good password' },
        { w:'100%', bg:'var(--mint)',   t:'Strong password ✓' },
      ];
      const s = scores[score];
      document.getElementById('pwBar').style.width      = s.w;
      document.getElementById('pwBar').style.background = s.bg;
      document.getElementById('pwHint').textContent     = s.t;
    }

    /* ── REGISTER HANDLER ──────────────────────────────────────────────
       Calls POST /auth/register then auto-logs in.
       TO CHANGE REDIRECT AFTER SIGNUP: edit window.location.href
    ─────────────────────────────────────────────────────────────────── */
    async function register() {
      const full_name = document.getElementById('name').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      document.getElementById('errBox').style.display = 'none';

      if (!full_name) { showErr('Please enter your full name.'); return; }
      if (!email)     { showErr('Please enter your email address.'); return; }
      if (password.length < 8) { showErr('Password must be at least 8 characters.'); return; }

      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Creating account…';

      try {
        /* Register */
        await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ full_name, email, password })
        });
        /* Auto-login after successful registration */
        const loginData = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        saveAuth(loginData.access_token, {
          user_id: loginData.user_id, full_name: loginData.full_name, role: loginData.role
        });
        toast('Account created! Welcome 🎉', 'success');
        setTimeout(() => window.location.href = '../index.html', 700);
      } catch(e) {
        showErr(e.message || 'Registration failed. Please try again.');
        btn.disabled = false; btn.textContent = 'Create Free Account';
      }
    }
  </script>
</body>
</html>
