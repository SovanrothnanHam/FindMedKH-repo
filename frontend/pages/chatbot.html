<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MED Chatbot – FindMEDKH</title>
  <link rel="stylesheet" href="../assets/css/shared.css"/>
  <style>
    /* ═══════════════════════════════════════════════════════════════
       PAGE STYLES: chatbot.html
       TO CUSTOMIZE:
       • Sidebar background: edit background: var(--sky-dark) in .chat-sidebar
       • Chat bubble colors: edit .bubble.bot and .bubble.user colors
       • Bot avatar icon: change the ✚ character in .bot-av
       • Input area: edit .chat-input-area styles
       • Quick buttons: edit .quick-btn styles and buttons in HTML
    ═══════════════════════════════════════════════════════════════ */
    body { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
    #navbar { flex-shrink:0; }
    .chat-layout { display:flex; flex:1; overflow:hidden; }

    /* ── LEFT SIDEBAR ── */
    /* TO CHANGE SIDEBAR COLOR: edit background here */
    .chat-sidebar {
      width:270px; flex-shrink:0; overflow-y:auto; padding:1.5rem;
      display:flex; flex-direction:column; gap:.7rem;
      background: linear-gradient(180deg, var(--sky-dark), var(--navy));
      color:var(--white);
    }
    .sidebar-logo { font-family:'Fraunces',serif; font-size:1.15rem; color:var(--gold); display:flex; align-items:center; gap:.5rem; margin-bottom:.3rem; }
    .sidebar-desc { font-size:.82rem; opacity:.65; line-height:1.55; margin-bottom:.4rem; }
    .sidebar-divider { border:none; border-top:1px solid rgba(255,255,255,.12); }
    .sidebar-label { font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; opacity:.45; margin-top:.2rem; }
    /* Quick symptom buttons in sidebar */
    .quick-btn {
      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
      color:rgba(255,255,255,.82); border-radius:var(--r-md); padding:.55rem .85rem;
      text-align:left; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;
      font-size:.82rem; transition:all var(--t); width:100%;
    }
    .quick-btn:hover { background:rgba(255,255,255,.18); color:var(--white); }
    /* GPS location toggle at bottom of sidebar */
    .loc-toggle {
      margin-top:auto; background:rgba(244,200,66,.15); border:1px solid var(--gold);
      color:var(--gold); border-radius:var(--r-md); padding:.55rem .85rem;
      cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; font-size:.82rem;
      width:100%; transition:all var(--t); font-weight:600;
    }
    .loc-toggle.active { background:rgba(244,200,66,.3); }
    .loc-info { font-size:.74rem; opacity:.5; text-align:center; margin-top:.3rem; }

    /* ── MAIN CHAT AREA ── */
    .chat-main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--sky-xpale); }

    /* Chat header bar */
    .chat-header {
      background:var(--white); border-bottom:1px solid var(--border);
      padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; flex-shrink:0;
    }
    /* Bot avatar circle — TO CHANGE ICON: change ✚ text and background */
    .bot-av {
      width:44px; height:44px; border-radius:50%;
      background:linear-gradient(135deg,var(--sky),var(--sky-dark));
      display:flex; align-items:center; justify-content:center;
      color:var(--white); font-size:1.25rem; flex-shrink:0;
      box-shadow:0 3px 10px rgba(46,134,193,.3);
    }
    .bot-name { font-weight:700; color:var(--sky-dark); font-size:.97rem; }
    .bot-status { font-size:.76rem; color:var(--ink-muted); display:flex; align-items:center; gap:.35rem; }
    /* Green pulsing dot */
    .status-dot { width:7px; height:7px; border-radius:50%; background:var(--mint); animation:blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    /* Message counter in header */
    .msg-counter { margin-left:auto; background:var(--sky-pale); border-radius:50px; padding:.3rem .9rem; font-size:.78rem; font-weight:600; color:var(--sky-dark); }
    .msg-counter.warn { background:#fff3cd; color:#856404; }

    /* ── MESSAGES AREA ── */
    .chat-messages { flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:1.2rem; }
    .chat-messages::-webkit-scrollbar { width:4px; }
    .chat-messages::-webkit-scrollbar-thumb { background:var(--sky-light); border-radius:2px; }

    /* Message row */
    .msg-row { display:flex; gap:.6rem; align-items:flex-end; animation:msgIn .25s ease; }
    .msg-row.user { flex-direction:row-reverse; }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* Avatar circle next to each message */
    .msg-av { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.9rem; flex-shrink:0; }
    .msg-row.bot  .msg-av { background:linear-gradient(135deg,var(--sky),var(--sky-dark)); color:var(--white); }
    .msg-row.user .msg-av { background:var(--coral); color:var(--white); }

    /* Chat bubble styles */
    .bubble { max-width:70%; padding:.75rem 1.1rem; border-radius:18px; font-size:.9rem; line-height:1.55; }
    /* Bot bubble: white card */
    .msg-row.bot  .bubble { background:var(--white); border:1px solid var(--border); border-bottom-left-radius:4px; box-shadow:var(--shadow-xs); color:var(--ink-mid); }
    /* User bubble: blue */
    .msg-row.user .bubble { background:linear-gradient(135deg,var(--sky),var(--sky-dark)); color:var(--white); border-bottom-right-radius:4px; }

    /* Hospital mini-cards inside bot bubble */
    .chat-hosp-cards { display:flex; flex-direction:column; gap:.6rem; margin-top:.75rem; }
    .chat-hcard { background:var(--sky-xpale); border:1px solid var(--border); border-radius:var(--r-md); overflow:hidden; }
    /* Photo in chat hospital card */
    .chat-hcard-photo { height:90px; overflow:hidden; background:linear-gradient(135deg,var(--sky-pale),var(--sky-light)); }
    .chat-hcard-photo img { width:100%; height:100%; object-fit:cover; }
    .chat-hcard-body { padding:.7rem .9rem; }
    .cha-top { display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem; margin-bottom:.4rem; }
    .cha-name { font-weight:700; font-size:.88rem; color:var(--sky-dark); }
    .cha-meta { font-size:.77rem; color:var(--ink-muted); display:flex; flex-direction:column; gap:.2rem; }
    .cha-meta span { display:flex; align-items:center; gap:.3rem; }
    .cha-meta a { color:var(--sky-dark); }
    .cha-dist { display:inline-flex; align-items:center; gap:.25rem; background:var(--sky-pale); color:var(--sky-dark); font-size:.72rem; font-weight:700; padding:.2rem .55rem; border-radius:50px; margin-top:.35rem; }

    /* Typing animation (3 dots) */
    .typing-dots { display:flex; gap:5px; padding:.35rem .2rem; }
    .typing-dots span { width:8px; height:8px; background:var(--sky-light); border-radius:50%; animation:tdot 1.2s infinite; }
    .typing-dots span:nth-child(2){animation-delay:.2s;}
    .typing-dots span:nth-child(3){animation-delay:.4s;}
    @keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

    /* ── INPUT AREA ── */
    .chat-input-area { background:var(--white); border-top:1px solid var(--border); padding:1rem 1.5rem; flex-shrink:0; }
    .input-row { display:flex; gap:.7rem; align-items:flex-end; }
    .input-row textarea {
      flex:1; padding:.72rem 1rem; border:1.5px solid var(--border); border-radius:var(--r-lg);
      font-family:'Plus Jakarta Sans',sans-serif; font-size:.93rem; resize:none;
      outline:none; min-height:44px; max-height:120px; line-height:1.5; transition:border-color var(--t);
    }
    .input-row textarea:focus { border-color:var(--sky); }
    /* Send button — TO CHANGE COLOR: edit background */
    .send-btn {
      width:44px; height:44px; border-radius:50%;
      background:linear-gradient(135deg,var(--sky),var(--sky-dark));
      border:none; color:var(--white); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:all var(--t); font-size:1.1rem;
    }
    .send-btn:hover { transform:scale(1.08); box-shadow:var(--shadow-sm); }
    .send-btn:disabled { opacity:.4; transform:none; cursor:not-allowed; }
    /* Limit reached banner */
    .limit-banner { background:linear-gradient(135deg,#fff8e1,#fff0c2); border:1px solid var(--gold); border-radius:var(--r-md); padding:1rem; display:flex; gap:.75rem; }
    .limit-banner .lb-icon { font-size:1.5rem; flex-shrink:0; }
    .limit-banner strong { color:#7D6608; display:block; margin-bottom:.25rem; }
    .limit-banner .lb-actions { display:flex; gap:.5rem; margin-top:.6rem; flex-wrap:wrap; }

    /* ── RESPONSIVE ── */
    @media(max-width:800px) { .chat-sidebar{display:none;} }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="chat-layout">

    <!-- ── SIDEBAR ─────────────────────────────────────────────────────────
         TO CHANGE QUICK BUTTONS: edit .quick-btn text and onclick message
         TO ADD A BUTTON: copy a .quick-btn line and change content
    ──────────────────────────────────────────────────────────────────────── -->
    <aside class="chat-sidebar">
      <div class="sidebar-logo">✚ MED Assistant</div>
      <p class="sidebar-desc">Tell me your symptoms and I'll recommend the right hospital in Phnom Penh.</p>
      <hr class="sidebar-divider"/>
      <div class="sidebar-label">Quick Symptoms</div>
      <!-- TO CHANGE BUTTON TEXT/MESSAGE: edit text and onclick string -->
      <button class="quick-btn" onclick="fillInput('I have chest pain')">❤️ Chest pain / Heart</button>
      <button class="quick-btn" onclick="fillInput('My child has fever')">👶 Child is sick</button>
      <button class="quick-btn" onclick="fillInput('tooth pain dentist')">🦷 Tooth pain</button>
      <button class="quick-btn" onclick="fillInput('eye problem blurry vision')">👁️ Eye problem</button>
      <button class="quick-btn" onclick="fillInput('I feel depressed anxious')">🧠 Mental health</button>
      <button class="quick-btn" onclick="fillInput('I am pregnant maternity')">🤰 Pregnancy</button>
      <button class="quick-btn" onclick="fillInput('muscle pain physiotherapy rehab')">🏃 Physiotherapy</button>
      <button class="quick-btn" onclick="fillInput('emergency accident urgent')">🚨 Emergency</button>
      <hr class="sidebar-divider"/>
      <!-- GPS button -->
      <button class="loc-toggle" id="locToggle" onclick="toggleLoc()">📍 Enable Location</button>
      <div class="loc-info" id="locInfo">Share location for distance sorting</div>
    </aside>

    <!-- ── MAIN CHAT ── -->
    <div class="chat-main">
      <!-- Chat header bar -->
      <div class="chat-header">
        <div class="bot-av">✚</div>
        <div>
          <div class="bot-name">MED Assistant</div>
          <div class="bot-status"><span class="status-dot"></span> Online · Phnom Penh</div>
        </div>
        <div class="msg-counter" id="msgCounter">5 messages left</div>
      </div>

      <!-- Messages area — messages injected here by JavaScript -->
      <div class="chat-messages" id="chatMessages"></div>

      <!-- Input area -->
      <div class="chat-input-area">
        <div class="input-row">
          <!-- Press Enter to send, Shift+Enter for new line -->
          <textarea id="chatInput"
            placeholder="Describe your symptoms…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
            oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMsg()" title="Send message">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/shared.js"></script>
  <script>
    renderNavbar('chatbot');

    /* State */
    const sessionId = getSessionId();
    const user = getUser();
    let userLat = null, userLon = null;
    let msgCount = 0;
    const GUEST_LIMIT = 5;  /* TO CHANGE LIMIT: edit backend .env GUEST_MAX_MESSAGES */

    /* ── Hospital photos for chat cards ── */
    /* Same photo map pattern as hospitals.html */
    function getChatPhoto(name) {
      const n = name.toLowerCase();
      if (n.includes('dental') || n.includes('teeth')) return 'https://images.unsplash.com/photo-1606811841689-23dfddce3e66?w=300&h=90&fit=crop&q=80';
      if (n.includes('eye')) return 'https://images.unsplash.com/photo-1508193638397-1c4234db14d8?w=300&h=90&fit=crop&q=80';
      if (n.includes('child') || n.includes('pediatric') || n.includes('kantha')) return 'https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=300&h=90&fit=crop&q=80';
      if (n.includes('mental') || n.includes('psych')) return 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=300&h=90&fit=crop&q=80';
      if (n.includes('physio') || n.includes('rehab')) return 'https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=300&h=90&fit=crop&q=80';
      return 'https://images.unsplash.com/photo-1538108149393-fbbd81895907?w=300&h=90&fit=crop&q=80';
    }

    /* Auto-resize textarea as user types */
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    /* Update the message counter display */
    function updateCounter() {
      const el = document.getElementById('msgCounter');
      if (user) { el.textContent = '∞ messages'; el.className = 'msg-counter'; return; }
      const left = Math.max(GUEST_LIMIT - msgCount, 0);
      el.textContent = `${left} message${left===1?'':'s'} left`;
      el.className = 'msg-counter' + (left <= 2 ? ' warn' : '');
    }

    /* Add a message bubble to the chat */
    function addMsg(sender, html, scroll = true) {
      const row = document.createElement('div');
      row.className = `msg-row ${sender}`;
      const av = sender === 'bot' ? '✚' : (user ? user.full_name[0].toUpperCase() : '👤');
      row.innerHTML = `<div class="msg-av">${av}</div><div class="bubble">${html}</div>`;
      document.getElementById('chatMessages').appendChild(row);
      if (scroll) scrollBottom();
    }

    /* Show/hide typing indicator (3 bouncing dots) */
    function showTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row bot'; row.id = 'typingRow';
      row.innerHTML = `<div class="msg-av">✚</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      document.getElementById('chatMessages').appendChild(row);
      scrollBottom();
    }
    function removeTyping() { document.getElementById('typingRow')?.remove(); }
    function scrollBottom() { const el = document.getElementById('chatMessages'); el.scrollTop = el.scrollHeight; }

    /* Render hospital recommendation cards inside a bot message */
    function renderHospCards(hospitals) {
      if (!hospitals.length) return '';
      return `<div class="chat-hosp-cards">${hospitals.map(h => `
        <div class="chat-hcard">
          <div class="chat-hcard-photo">
            <img src="${getChatPhoto(h.name)}" alt="${esc(h.name)}" loading="lazy"
              onerror="this.parentElement.style.background='var(--sky-pale)'" />
          </div>
          <div class="chat-hcard-body">
            <div class="cha-top">
              <span class="cha-name">${esc(h.name)}</span>
              <span class="badge badge-${h.hospital_type}" style="font-size:.68rem">${h.hospital_type}</span>
            </div>
            <div class="cha-meta">
              ${h.address    ? `<span>📍 ${esc(h.address)}</span>` : ''}
              ${h.phone      ? `<span>📞 ${esc(h.phone)}</span>` : ''}
              ${h.opening_hours ? `<span>🕐 ${esc(h.opening_hours)}</span>` : ''}
              ${h.website    ? `<span>🌐 <a href="${esc(h.website)}" target="_blank" rel="noopener">Website</a></span>` : ''}
            </div>
            ${h.distance_km != null ? `<span class="cha-dist">📍 ${h.distance_km} km away</span>` : ''}
          </div>
        </div>`).join('')}</div>`;
    }

    /* ── SEND MESSAGE ─────────────────────────────────────────────────── */
    async function sendMsg() {
      const ta = document.getElementById('chatInput');
      const msg = ta.value.trim();
      if (!msg) return;

      ta.value = ''; autoResize(ta);
      document.getElementById('sendBtn').disabled = true;
      addMsg('user', esc(msg));
      showTyping();

      try {
        /* POST to /chat endpoint */
        const data = await apiFetch('/chat', {
          method: 'POST',
          body: JSON.stringify({
            session_id: sessionId,
            message:    msg,
            user_id:    user?.user_id || null,
            latitude:   userLat,
            longitude:  userLon,
          })
        });
        removeTyping();
        msgCount = data.message_count;
        updateCounter();

        if (data.limit_reached) {
          /* Show login prompt when guest hits limit */
          addMsg('bot', `<div class="limit-banner">
            <span class="lb-icon">🔒</span>
            <div>
              <strong>Guest limit reached</strong>
              You've used all 5 free messages.
              <div class="lb-actions">
                <a href="login.html" class="btn btn-primary btn-sm">Log In</a>
                <a href="signup.html" class="btn btn-outline btn-sm">Register Free</a>
              </div>
            </div>
          </div>`);
          document.getElementById('chatInput').disabled = true;
          document.getElementById('sendBtn').disabled = true;
          return;
        }

        /* Show bot response + hospital cards */
        addMsg('bot', esc(data.response_text) + renderHospCards(data.hospitals));
      } catch(e) {
        removeTyping();
        addMsg('bot', '⚠️ Cannot connect to server. Make sure the backend is running on port 8000.');
      }
      document.getElementById('sendBtn').disabled = false;
    }

    /* Fill input from sidebar quick buttons */
    function fillInput(text) {
      const ta = document.getElementById('chatInput');
      ta.value = text; autoResize(ta); ta.focus();
    }

    /* Toggle GPS location */
    function toggleLoc() {
      if (userLat) {
        userLat = userLon = null;
        document.getElementById('locToggle').textContent = '📍 Enable Location';
        document.getElementById('locToggle').classList.remove('active');
        document.getElementById('locInfo').textContent = 'Share location for distance sorting';
      } else {
        navigator.geolocation?.getCurrentPosition(
          pos => {
            userLat = pos.coords.latitude; userLon = pos.coords.longitude;
            document.getElementById('locToggle').textContent = '✅ Location Active';
            document.getElementById('locToggle').classList.add('active');
            document.getElementById('locInfo').textContent = `${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;
            addMsg('bot', '📍 Location received! Hospitals will now be sorted by distance from you.');
          },
          () => toast('Could not get location', 'error')
        );
      }
    }

    /* Load previous chat history */
    async function loadHistory() {
      try {
        const data = await apiFetch(`/chat/history/${sessionId}`);
        data.messages.forEach(m => {
          if (m.sender === 'user') addMsg('user', esc(m.message), false);
          else addMsg('bot', esc(m.message), false);
        });
        msgCount = Math.floor(data.messages.length / 2);
        updateCounter(); scrollBottom();
      } catch(e) { /* Silently fail — history just won't load */ }
    }

    /* Initialize */
    updateCounter();
    /* Welcome message — TO CHANGE: edit this string */
    addMsg('bot', 'Hello! 😊 I\'m your <strong>MED Assistant</strong>.<br/>Tell me your symptoms and I\'ll recommend the best hospitals in Phnom Penh.<br/><br/><em style="font-size:.83rem;opacity:.7">Try: "I have chest pain" or "My child has fever"</em>');
    loadHistory();

    /* Handle pre-filled message from specialty chips on home page */
    const prefill = localStorage.getItem('fmkh_prefill');
    if (prefill) { localStorage.removeItem('fmkh_prefill'); setTimeout(() => fillInput(prefill), 500); }
  </script>
</body>
</html>
