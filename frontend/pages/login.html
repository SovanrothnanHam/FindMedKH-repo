<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <!-- TO CHANGE PAGE TITLE: edit below -->
  <title>Log In – FindMEDKH</title>
  <link rel="stylesheet" href="../assets/css/shared.css"/>
  <style>
    /* ═══════════════════════════════════════════════════════════════
       PAGE STYLES: login.html
       TO CUSTOMIZE:
       • Page background: edit body background-image gradient
       • Card size: edit max-width: 420px in .auth-card
       • Logo: edit .logo-icon and .logo-text
    ═══════════════════════════════════════════════════════════════ */
    /* Full-page gradient background — TO CHANGE: edit gradient colors */
    body {
      display:flex; flex-direction:column; min-height:100vh;
      background: linear-gradient(140deg, var(--sky-dark) 0%, var(--sky) 50%, var(--sky-light) 100%);
    }
    /* Semi-transparent navbar on gradient bg */
    #navbar { background:rgba(255,255,255,.15); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,.2); }
    .nav-brand { color:var(--white) !important; }
    .nav-links a { color:rgba(255,255,255,.8) !important; }
    .nav-links a:hover { color:var(--white) !important; }

    /* Centered card wrapper */
    .auth-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 1.5rem; }
    /* White card — TO CHANGE SIZE: edit max-width */
    .auth-card { background:var(--white); border-radius:var(--r-xl); padding:3rem 2.5rem; width:100%; max-width:420px; box-shadow:var(--shadow-xl); }

    /* Logo section at top of card — TO CHANGE LOGO: edit .logo-icon emoji/text */
    .auth-logo { text-align:center; margin-bottom:1.8rem; }
    .logo-icon {
      width:64px; height:64px; margin:0 auto .9rem;
      background:linear-gradient(135deg, var(--sky), var(--sky-dark));
      border-radius:18px; display:flex; align-items:center;
      justify-content:center; font-size:1.9rem; color:var(--white);
      box-shadow:0 6px 20px rgba(46,134,193,.3);
    }
    .auth-logo h2 { margin-bottom:.3rem; }
    .auth-logo p  { color:var(--ink-muted); font-size:.9rem; }

    /* Password show/hide toggle inside input */
    .input-wrap { position:relative; }
    .input-wrap input { padding-right:2.8rem; }
    .show-pass { position:absolute; right:.8rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--ink-muted); font-size:.88rem; padding:.2rem; transition:color var(--t); }
    .show-pass:hover { color:var(--sky); }

    /* Error box — shown when login fails */
    .err-box { background:var(--danger-pale); border:1px solid #F5C6C2; border-radius:var(--r-sm); padding:.7rem 1rem; font-size:.85rem; color:var(--danger); margin-bottom:1rem; display:none; }

    /* Divider line between card sections */
    .auth-divider { display:flex; align-items:center; gap:.8rem; margin:1.3rem 0; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .auth-divider span { font-size:.78rem; color:var(--ink-muted); }

    /* Link to signup page */
    .auth-switch { text-align:center; margin-top:1.2rem; font-size:.88rem; color:var(--ink-muted); }
    .auth-switch a { color:var(--sky-dark); font-weight:600; }
    .auth-switch a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="auth-wrap">
    <div class="auth-card">

      <!-- LOGO — TO CHANGE: edit emoji in .logo-icon and heading text -->
      <div class="auth-logo">
        <div class="logo-icon">✚</div>
        <!-- TO CHANGE CARD TITLE: edit h2 text -->
        <h2>Welcome Back</h2>
        <p>Log in to save your chat history</p>
      </div>

      <!-- Error message box (hidden by default) -->
      <div class="err-box" id="errBox"></div>

      <!-- Email field -->
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>

      <!-- Password field with show/hide toggle -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')login()"/>
          <!-- Toggle button: click to show/hide password -->
          <button class="show-pass" type="button" onclick="togglePass()" title="Show/hide password">👁</button>
        </div>
      </div>

      <!-- Submit button -->
      <button class="btn btn-primary btn-full btn-lg" id="loginBtn" onclick="login()" style="margin-top:.5rem">
        Log In
      </button>

      <div class="auth-divider"><span>or</span></div>

      <!-- Link to registration page -->
      <div class="auth-switch">
        Don't have an account? <a href="signup.html">Create one free →</a>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="../assets/js/shared.js"></script>
  <script>
    /* Render minimal navbar (no active page) */
    renderNavbar('login');

    /* Redirect if already logged in */
    if (isLoggedIn()) window.location.href = '../index.html';

    /* Show error message in the err-box */
    function showErr(msg) {
      const el = document.getElementById('errBox');
      el.textContent = msg; el.style.display = 'block';
    }

    /* Toggle password visibility */
    function togglePass() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    /* ── LOGIN HANDLER ─────────────────────────────────────────────────
       Calls POST /auth/login, saves token, redirects.
       TO CHANGE REDIRECT AFTER LOGIN: edit window.location.href below
    ─────────────────────────────────────────────────────────────────── */
    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      document.getElementById('errBox').style.display = 'none';

      if (!email || !password) { showErr('Please fill in all fields.'); return; }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in…';

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        /* Save auth data to localStorage */
        saveAuth(data.access_token, {
          user_id: data.user_id, full_name: data.full_name, role: data.role
        });
        toast('Welcome back! 👋', 'success');
        /* TO CHANGE WHERE USER GOES AFTER LOGIN: edit href values below */
        setTimeout(() => {
          window.location.href = data.role === 'admin' ? 'admin.html' : '../index.html';
        }, 600);
      } catch(e) {
        showErr(e.message || 'Login failed. Check your email and password.');
        btn.disabled = false; btn.textContent = 'Log In';
      }
    }
  </script>
</body>
</html>
